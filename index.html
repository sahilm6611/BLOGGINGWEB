<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBlog</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo">MyBlog</div>
  <ul class="nav-links">
    <li><a href="#" id="show-home">Home</a></li>
    <li><a href="#" id="show-login">Login</a></li>
    <li><a href="#" id="show-signup">Signup</a></li>
    <li><a href="#" id="logout-btn" style="display:none;">Logout</a></li>
  </ul>
</nav>

<!-- Hero Section -->
<section class="hero" id="home">
  <div class="hero-text">
    <h1>Welcome to MyBlog</h1>
    <p>Share your thoughts, stories, and ideas.</p>
    <button id="show-posts-btn">Explore Posts</button>
  </div>
</section>

<!-- Signup -->
<section id="signup-section" class="auth-section" style="display:none;">
  <div class="auth-card">
    <h2>Create Account</h2>
    <input type="text" id="signup-username" placeholder="Username">
    <input type="email" id="signup-email" placeholder="Email">
    <input type="password" id="signup-password" placeholder="Password">
    <button id="signup-btn">Signup</button>
  </div>
</section>

<!-- Login -->
<section id="login-section" class="auth-section" style="display:none;">
  <div class="auth-card">
    <h2>Login</h2>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-password" placeholder="Password">
    <button id="login-btn">Login</button>
  </div>
</section>

<!-- Posts -->
<section id="posts-section" style="display:none;">
  <div class="posts-wrapper">

    <!-- Create Post -->
    <div class="create-post-card">
      <h3>Create New Post</h3>
      <input type="text" id="post-title" placeholder="Title">
      <input type="text" id="post-image" placeholder="Image URL">
      <textarea id="post-content" placeholder="Content"></textarea>
      <button id="create-post-btn">Create Post</button>
    </div>

    <!-- Posts List -->
    <div id="posts-list" class="posts-list"></div>

  </div>
</section>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
